name: Build EX-word Add-on

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build:
    name: Build for Casio EX-word
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download devkitSH4 toolchain
        run: |
          cd ..
          curl -sSfL https://github.com/MaxSignal/buildscripts/releases/download/Linux/devkitPro.tar.gz | tar -zxf -
          echo "Toolchain extracted successfully"
          ls devkitPro/

      - name: Build app
        run: |
          export DEVKITPRO="$GITHUB_WORKSPACE/../devkitPro"
          export DEVKITSH4="$DEVKITPRO/devkitSH4"
          export PATH="$DEVKITPRO/tools/bin:$DEVKITSH4/bin:$PATH"
          make
          echo "Build output:"
          ls -la build/

      - name: Package build output
        run: |
          zip -r build.zip build/
          echo "Package contents:"
          unzip -l build.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: exword-hello-addon
          path: build.zip
          retention-days: 30
